[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks.git"
rev = "v4.3.0"
hooks = [
    {id = "trailing-whitespace"},
    {id = "check-case-conflict"},
    {id = "end-of-file-fixer"},
    {id = "check-json"},
    {id = "check-toml"},
    {id = "check-yaml"},
    {id = "check-merge-conflict"},
    {id = "no-commit-to-branch", args = ["--branch", "main"]},
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.0" # Ruff version.
hooks = [
  # Run the linter.
  {id = "ruff-check", args = ["--fix"], types_or = ["python", "pyi", "jupyter", "pyproject"]},

  # Run the formatter.
  {id = "ruff-format", types_or = ["python", "pyi", "jupyter"]},
]

[[repos]]
repo = "local"
hooks = [
  {id = "ty-check", name = "ty-check", language = "system", entry = "uvx ty check", files = "\\.py$"},
]
