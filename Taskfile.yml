version: '3'

dotenv: ['.env']

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list-all

  compile-requirements:
    cmds:
      - pip-compile

  start:
    dir: '{{.TASKFILE_DIR}}/miapeer'
    cmds:
      - fastapi dev

  tdd:
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - ptw --runner "bash pytest-runner.sh" --ext .py,.sql

  coverage-report:
    aliases: [cov, coverage]
    cmds:
      - pytest --cov=miapeer --cov-report=term-missing:skip-covered --cov-fail-under=90 miapeer/tests/

  type-check:
    aliases: [ty]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uvx ty check --watch
